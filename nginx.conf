# ═══════════════════════════════════════════════════
#  SKYY – Nginx Reverse Proxy Configuration
#  Production-grade SSL termination & security headers
# ═══════════════════════════════════════════════════

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # ─── Basic Settings ───
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100K;

    # ─── MIME Types ───
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=32k;
    error_log /var/log/nginx/error.log warn;

    # ─── SSL Settings ───
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Security Headers ───
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    # ─── Gzip ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ─── Rate Limiting Zones ───
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=global:10m rate=200r/m;

    # ─── Upstream ───
    upstream skyy_app {
        server web:5000;
        keepalive 32;
    }

    # ─── HTTP → HTTPS Redirect ───
    server {
        listen 80;
        server_name skyy.app;
        return 301 https://$server_name$request_uri;
    }

    # ─── HTTPS Server ───
    server {
        listen 443 ssl http2;
        server_name skyy.app;

        # SSL certificates (mount from host)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ─── Root location ───
        location / {
            limit_req zone=global burst=20 nodelay;
            proxy_pass http://skyy_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
        }

        # ─── Static files (cache aggressively) ───
        location /static/ {
            alias /app/static/;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ─── Health check ───
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ─── Deny access to sensitive files ───
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ /(migrations|logs|venv|__pycache__) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}